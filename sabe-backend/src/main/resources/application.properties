spring.application.name=sabe
server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sabe_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Descomentar esta linea cuando se desee borrar y recrear todas las tablas al iniciar la app
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
app.migration.legacy-results.enabled=true
app.security.jwt-secret=${SABE_JWT_SECRET:secret-dev-sabe-cambiar-en-produccion}
app.security.jwt-expiration-minutes=${SABE_JWT_EXPIRATION_MINUTES:480}
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=24MB
springdoc.swagger-ui.path=/swagger-ui.html

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.url=${CLOUDINARY_URL:}
cloudinary.folder=${CLOUDINARY_FOLDER:sabe}
